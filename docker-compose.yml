version: "3.8"

services:
  essencialmedic:
    image: wordpress:latest
    container_name: essencialmedic-wordpress
    restart: always
    ports:
      - "4180:80"
    env_file: .env
    volumes:
      - ./wp-content:/var/www/html/wp-content
    networks:
      - sigma-net
    depends_on:
      - essencialmedic-db

  essencialmedic-db:
    image: mariadb:10.6
    container_name: essencialmedic-db
    restart: always
    env_file: .env
    ports:
      - "127.0.0.1:4154:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sigma-net

volumes:
  db_data:

networks:
  sigma-net:
    external: true
